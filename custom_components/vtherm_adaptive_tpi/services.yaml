reset_learning:
  name: Reset Adaptive TPI learning
  description: Reset the Adaptive TPI learning state for a thermostat.
  fields:
    entity_id:
      name: Target thermostat
      description: The VTherm climate entity to reset.
      required: true
      selector:
        entity:
          domain: climate
reset_valve_curve:
  name: Reset Adaptive TPI valve curve
  description: Reset only the Adaptive TPI valve curve for a thermostat.
  fields:
    entity_id:
      name: Target thermostat
      description: The VTherm climate entity whose valve curve should be reset.
      required: true
      selector:
        entity:
          domain: climate
