name: Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  pytest:
    name: Run Pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Checkout versatile_thermostat
        uses: actions/checkout@v6
        with:
          repository: jmcollin78/versatile_thermostat
          path: versatile_thermostat_repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-homeassistant-custom-component coverage homeassistant vtherm-api

      - name: Add project dependencies to PYTHONPATH
        run: echo "PYTHONPATH=$PWD/versatile_thermostat_repo:$PYTHONPATH" >> $GITHUB_ENV

      - name: Run Pytest
        run: pytest tests/
